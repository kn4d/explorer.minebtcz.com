server {
    listen 80;
    server_name explorer.minebtcz.com;

    location / {
        proxy_pass http://explorer:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name explorer.minebtcz.com;

    ssl_certificate /etc/letsencrypt/live/explorer.minebtcz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.minebtcz.com/privkey.pem;

    location / {
        proxy_pass http://explorer:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
