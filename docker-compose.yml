services:
  explorer:
    image: node:20-alpine
    container_name: btcz-explorer
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    command: sh -lc "npm install && node server.js"
    volumes:
      - ./app:/app
      - ./web:/web:ro
      - ./addons:/addons
    ports:
      - "127.0.0.1:8088:8080"
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_GATEWAY}"
    networks:
      - explorer_net

  nginx:
    image: nginx:alpine
    container_name: btcz-explorer-nginx
    restart: unless-stopped
    depends_on:
      - explorer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - explorer_net

networks:
  explorer_net:
    name: ${DOCKER_NETWORK_NAME}
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET}
